version: 2.1

jobs:
  lint:
    docker:
      - image: denoland/deno:latest
    steps:
      - checkout
      - run:
          name: Cache dependencies
          command: deno cache --reload .
      - run:
          name: Run linter
          command: deno task check

  build:
    docker:
      - image: denoland/deno:latest
    steps:
      - checkout
      - run:
          name: Cache dependencies
          command: deno cache --reload .
      - run:
          name: Build extension
          command: deno task build

workflows:
  ci:
    jobs:
      - lint
      - build:
          requires:
            - lint
