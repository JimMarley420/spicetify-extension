version: 2.1

jobs:
  test:
    docker:
      - image: cimg/base:current

    steps:
      - checkout

      # Installer Deno
      - run:
          name: Install Deno
          command: |
            curl -fsSL https://deno.land/install.sh | sh
            echo 'export DENO_INSTALL="$HOME/.deno"' >> $BASH_ENV
            echo 'export PATH="$DENO_INSTALL/bin:$PATH"' >> $BASH_ENV
            source $BASH_ENV
            deno --version

      # Lint
      - run:
          name: Run linter
          command: deno lint

      # Tests
      - run:
          name: Run tests
          command: deno test -A

workflows:
  test-workflow:
    jobs:
      - test