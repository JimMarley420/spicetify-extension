version: 2.1

jobs:
  lint:
    docker:
      - image: denoland/deno:latest
    steps:
      - checkout
      - run:
          name: Lint
          command: deno lint

  typecheck:
    docker:
      - image: denoland/deno:latest
    steps:
      - checkout
      - run:
          name: Type check
          command: deno check .

  test:
    docker:
      - image: denoland/deno:latest
    steps:
      - checkout
      - run:
          name: Run tests
          command: deno test --allow-all

  build:
    docker:
      - image: denoland/deno:latest
    steps:
      - checkout
      - run:
          name: Build extension
          command: deno task build

workflows:
  ci:
    jobs:
      - lint
      - typecheck:
          requires:
            - lint
      - test:
          requires:
            - typecheck
      - build:
          requires:
            - test
