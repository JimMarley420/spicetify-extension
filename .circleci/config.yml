version: 2.1

jobs:
  lint:
    docker:
      - image: denoland/deno:latest
    steps:
      - checkout
      - run:
          name: Lint
          command: deno task lint

  typecheck:
    docker:
      - image: denoland/deno:latest
    steps:
      - checkout
      - run:
          name: Type check
          command: deno task typecheck

  test:
    docker:
      - image: denoland/deno:latest
    steps:
      - checkout
      - run:
          name: Run tests
          command: deno task test

  build:
    docker:
      - image: denoland/deno:latest
    steps:
      - checkout
      - run:
          name: Build extension
          command: deno task build
      - persist_to_workspace:
          root: .
          paths:
            - dist

  release:
    docker:
      - image: denoland/deno:latest
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Setup git
          command: |
            git config user.email "ci@circleci.com"
            git config user.name "circleci-bot"
      - run:
          name: Run release
          command: deno task release
      - run:
          name: Check for changes and commit
          command: |
            git add dist/
            if git diff --cached --quiet; then
              echo "No changes to commit"
              exit 0
            fi
            git commit -m "chore: update dist [ci skip]"
      - run:
          name: Push changes
          command: |
            git remote set-url origin https://${GITHUB_TOKEN}@github.com/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}.git
            git push origin HEAD:${CIRCLE_BRANCH}
      - store_artifacts:
          path: dist
          destination: dist

workflows:
  ci:
    jobs:
      - lint
      - build:
          requires:
            - lint
      - typecheck:
          requires:
            - build
      - test:
          requires:
            - typecheck
      - release:
          requires:
            - test
          filters:
            branches:
              only:
                - /feature\/.*/
                - /fix\/.*/