version: 2.1

jobs:
  update-deno-deps:
    docker:
      - image: denoland/deno:latest

    steps:
      - add_ssh_keys:
          fingerprints:
            - "zhvhgYmcZBO8Dfn8P32ETQ+agImCNXFQCu5UfPoYtRc"

      - checkout

      - run:
          name: Install dependencies
          command: |
            apt-get update && apt-get install -y git curl jq

      # 🔧 Configure Git (SSH)
      - run:
          name: Configure git
          command: |
            mkdir -p ~/.ssh
            ssh-keyscan github.com >> ~/.ssh/known_hosts

            git config user.email "ci@circleci.com"
            git config user.name "circleci-bot"

            git remote set-url origin git@github.com:${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}.git

      - run:
          name: Check outdated dependencies
          command: |
            deno outdated > outdated.txt || true
            cat outdated.txt

      - run:
          name: Stop if no updates
          command: |
            if [ ! -s outdated.txt ]; then
              echo "No dependency updates"
              circleci step halt
            fi

      - run:
          name: Create update branch
          command: |
            BRANCH="deps/auto-update-$(date +%Y%m%d%H%M%S)"
            echo "export UPDATE_BRANCH=$BRANCH" >> $BASH_ENV
            git checkout -b $BRANCH

      - run:
          name: Update dependencies
          command: |
            deno outdated --update

      - run:
          name: Commit changes
          command: |
            git add deno.json deno.lock || true

            if git diff --cached --quiet; then
              echo "No changes to commit"
              exit 0
            fi

            git commit -m "chore(deps): update deno dependencies [ci skip]"

      - run:
          name: Push branch
          command: |
            git push origin $UPDATE_BRANCH

      - run:
          name: Detect base branch
          command: |
            BASE_BRANCH=$(git remote show origin | sed -n '/HEAD branch/s/.*: //p')
            echo "export BASE_BRANCH=$BASE_BRANCH" >> $BASH_ENV

      - run:
          name: Create Pull Request
          command: |
            RESPONSE=$(curl -s -w "%{http_code}" -o pr_response.json -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/$CIRCLE_PROJECT_USERNAME/$CIRCLE_PROJECT_REPONAME/pulls \
              -d "{
                \"title\": \"chore(deps): update deno dependencies\",
                \"head\": \"$UPDATE_BRANCH\",
                \"base\": \"$BASE_BRANCH\",
                \"body\": \"Automated dependency update via CircleCI.\"
              }")

            if [ "$RESPONSE" -ge 400 ]; then
              echo "❌ PR creation failed"
              cat pr_response.json
              exit 1
            fi

            echo "✅ PR created"
            cat pr_response.json

      - run:
          name: Create Issue
          command: |
            BODY=$(cat outdated.txt)

            JSON=$(jq -n \
              --arg title "🔄 Deno dependencies update available" \
              --arg body "$BODY" \
              '{title: $title, body: ("```\n" + $body + "\n```")}')

            RESPONSE=$(curl -s -w "%{http_code}" -o issue_response.json -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/$CIRCLE_PROJECT_USERNAME/$CIRCLE_PROJECT_REPONAME/issues \
              -d "$JSON")

            if [ "$RESPONSE" -ge 400 ]; then
              echo "❌ Issue creation failed"
              cat issue_response.json
              exit 1
            fi

            echo "✅ Issue created"
            cat issue_response.json


