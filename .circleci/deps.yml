version: 2.1

jobs:
  update-deno-deps:
    docker:
      - image: denoland/deno:latest

    steps:
      - checkout

      - run:
          name: Install git + curl + jq
          command: |
            apt-get update && apt-get install -y git curl jq

      - run:
          name: Check outdated dependencies
          command: |
            deno outdated > outdated.txt || true
            cat outdated.txt

      - run:
          name: Update dependencies
          command: |
            deno outdated --update

      - run:
          name: Check if changes exist
          command: |
            git diff --exit-code || echo "deps updated"

      - run:
          name: Commit changes
          command: |
            git config user.email "ci@circleci.com"
            git config user.name "circleci-bot"

            git add deno.json deno.lock || true

            if git diff --cached --quiet; then
              echo "No dependency changes"
              exit 0
            fi

            git commit -m "deps: update deno dependencies [ci skip]"

      - run:
          name: Push changes
          command: |
            git push origin HEAD:${CIRCLE_BRANCH}

      - run:
          name: Create GitHub Issue if updates exist
          command: |
            if [ -s outdated.txt ]; then
              TITLE="🔄 Deno dependencies updates available"
              BODY=$(cat outdated.txt | sed 's/"/\\"/g')

              curl -X POST \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                https://api.github.com/repos/$CIRCLE_PROJECT_USERNAME/$CIRCLE_PROJECT_REPONAME/issues \
                -d "{
                  \"title\": \"$TITLE\",
                  \"body\": \"Deno dependency updates detected:\\n\\n\`\`\`\\n$BODY\\n\`\`\`\"
                }"
            else
              echo "No updates → no issue created"
            fi

workflows:
  deps:
    jobs:
      - update-deno-deps
